<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="dark">

<header>
    <div class="logo">🎵 High Performance Offline Music Retrieval System</div>
    <button id="themeBtn" class="theme-btn">Toggle Theme</button>
</header>

<div class="container">


    <div class="playlist-card">
        <h2>Playlist</h2>

        <div class="upload-row">
            <input type="file" id="fileInput" accept="audio/*">
            <button onclick="addSong()">Add</button>
        </div>

        <ul id="songList"></ul>
    </div>


    <div class="player-card">

        <div class="album-circle">🎧</div>

        <h2 id="songTitle">Select a Song</h2>

        <div class="controls">
            <button onclick="prevSong()">⏮</button>
            <button onclick="togglePlay()" id="playBtn" class="play">▶</button>
            <button onclick="nextSong()">⏭</button>
        </div>

        <div class="slider-group">
            <label>Duration</label>
            <input type="range" id="progress" value="0">
            <span id="time">0:00 / 0:00</span>
        </div>

        <div class="slider-group">
            <label>Volume</label>
            <input type="range" id="volume" min="0" max="1" step="0.01" value="0.7">
            <span id="volumePercent">70%</span>
        </div>

    </div>

</div>

<audio id="audio"></audio>

<script src="script.js"></script>
</body>
</html>
